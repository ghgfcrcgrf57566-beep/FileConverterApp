name: Build Flutter APK

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.pub-cache/bin
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Setup Java (Temurin 11)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'

      - name: Flutter pub get
        run: flutter pub get

      - name: Ensure gradle wrapper exists and is executable
        run: |
          set -e
          if [ -f android/gradlew ]; then
            chmod +x android/gradlew
          fi
          if [ ! -f android/gradle/wrapper/gradle-wrapper.jar ]; then
            echo "gradle-wrapper.jar missing — attempting to generate it using Gradle"
            # Install sdkman and Gradle to generate wrapper (best to commit wrapper into repo permanently)
            curl -s "https://get.sdkman.io" | bash
            # shellcheck source=/dev/null
            source "$HOME/.sdkman/bin/sdkman-init.sh"
            sdk install gradle || true
            cd android
            gradle wrapper
            cd ..
          else
            echo "gradle-wrapper.jar found"
          fi

      - name: Build release APK
        run: flutter build apk --release --no-shrink

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Flutter (pin action + channel)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # بدلاً من channel يمكنك تحديد نسخة محددة إذا فشل البحث:
      #- name: Set up Flutter (use specific version)
      #  uses: subosito/flutter-action@v2
      #  with:
      #    flutter-version: '3.10.5'   # مثال: استبدل بالنسخة المطلوبة
      #    cache: false

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release
        with:
          name: app-release-apks
          path: build/app/outputs/flutter-apk/*.apk
